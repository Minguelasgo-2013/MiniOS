<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sims Life</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --teal:#1cc8a0;
  --teal-d:#0f9d7a;
  --gold:#f5c842;
  --coral:#ff6b6b;
  --blue:#4a9eff;
  --purple:#9b7fe8;
  --green:#5dd87a;
  --orange:#ff9f43;
  --pink:#fd79a8;
  --bg:#0d1117;
  --panel:#161b22;
  --panel2:#1c2430;
  --border:#2a3441;
  --text:#e6edf3;
  --text2:#8b949e;
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  user-select:none;
}

.hdr{
  background:linear-gradient(90deg,#0d1117,#1a2332,#0d1117);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr-title{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--teal);letter-spacing:1px;text-shadow:0 0 20px rgba(28,200,160,.4);}
.hdr-time{display:flex;align-items:center;gap:16px;font-size:.85rem;color:var(--text2);}
.hdr-time .clk{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--gold);}
.money-disp{background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-weight:800;color:var(--gold);font-size:.95rem;}

.main{display:grid;grid-template-columns:260px 1fr 260px;flex:1;min-height:0;}

.panel-left{background:var(--panel);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.panel-right{background:var(--panel);border-left:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.center{display:flex;flex-direction:column;background:var(--bg);}

.sim-card{background:var(--panel2);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;}
.avatar-wrap{position:relative;width:90px;height:90px;margin:0 auto 10px;}
.avatar-bg{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#1cc8a0,#4a9eff);display:flex;align-items:center;justify-content:center;font-size:2.8rem;animation:bob 2.5s ease-in-out infinite;position:relative;overflow:hidden;}
.mood-badge{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--panel);border:2px solid var(--panel2);display:flex;align-items:center;justify-content:center;font-size:1rem;}
.sim-name{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--teal);}
.sim-trait{font-size:.75rem;color:var(--text2);margin-top:4px;}

.moodlet-bar{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.moodlet{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:4px 8px;font-size:.7rem;display:flex;align-items:center;gap:4px;}
.moodlet.active{background:#1cc8a015;border-color:var(--teal);color:var(--teal);}
.moodlet.bad{background:#ff6b6b15;border-color:var(--coral);color:var(--coral);}

.lvl-box{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:12px;}
.lvl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.lvl-label{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.lvl-num{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--gold);}
.xp-bar{height:6px;background:var(--border);border-radius:10px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:10px;transition:.4s;}

.needs-title{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.need{margin-bottom:10px;}
.need-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.need-label{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;}
.need-val{font-size:.72rem;color:var(--text2);font-weight:700;}
.need-track{height:10px;background:var(--border);border-radius:10px;overflow:hidden;position:relative;}
.need-fill{height:100%;border-radius:10px;transition:.5s cubic-bezier(.4,0,.2,1);position:relative;}
.need-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:30%;background:rgba(255,255,255,.2);border-radius:10px;}

.house-wrap{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;}
.house-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--text2);text-align:center;}
.house-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;}

.action-tray{background:var(--panel);border-top:1px solid var(--border);padding:12px 16px;}
.tray-title{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.tray-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}

.act-btn{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:10px 6px;cursor:pointer;text-align:center;transition:.15s;position:relative;overflow:hidden;}
.act-btn:hover{border-color:var(--teal);background:#1cc8a015;transform:translateY(-2px);}
.act-btn:active{transform:scale(.96);}
.act-btn.busy{opacity:.5;cursor:not-allowed;pointer-events:none;}
.act-icon{font-size:1.6rem;display:block;margin-bottom:4px;}
.act-name{font-size:.65rem;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;display:block;}
.act-cost{font-size:.6rem;color:var(--text2);margin-top:2px;display:block;}
.act-btn .shimmer{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);animation:shimmer 1.5s infinite;}

.event-panel{background:var(--panel2);border:1px solid var(--border);border-radius:14px;padding:14px;}
.ev-title{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.ev-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.78rem;animation:fadeSlide .3s ease;}
.ev-item:last-child{border-bottom:none;}
.ev-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);margin-top:5px;flex-shrink:0;}
.ev-dot.bad{background:var(--coral);}
.ev-dot.warn{background:var(--gold);}
.ev-time{color:var(--text2);flex-shrink:0;font-size:.7rem;}

.stats-box{background:var(--panel2);border:1px solid var(--border);border-radius:14px;padding:14px;}
.st-title{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.st-item{background:var(--panel);border-radius:10px;padding:8px;text-align:center;}
.st-val{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--gold);}
.st-lbl{font-size:.65rem;color:var(--text2);margin-top:2px;}

.skills-box{background:var(--panel2);border:1px solid var(--border);border-radius:14px;padding:14px;}
.sk-title{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.skill-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.skill-icon{font-size:1rem;}
.skill-info{flex:1;}
.skill-name{font-size:.72rem;font-weight:800;margin-bottom:3px;}
.skill-bar{height:5px;background:var(--border);border-radius:10px;overflow:hidden;}
.skill-fill{height:100%;border-radius:10px;transition:.5s;}
.skill-pct{font-size:.65rem;color:var(--text2);min-width:24px;text-align:right;}

.notif-layer{position:fixed;top:70px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:999;pointer-events:none;max-width:280px;}
.notif{background:var(--panel2);border:1px solid var(--teal);border-radius:12px;padding:10px 14px;font-size:.82rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;animation:notifIn .3s ease;box-shadow:0 4px 20px rgba(28,200,160,.2);pointer-events:all;}
.notif.bad{border-color:var(--coral);box-shadow:0 4px 20px rgba(255,107,107,.2);}
.notif.warn{border-color:var(--gold);box-shadow:0 4px 20px rgba(245,200,66,.2);}

.ev-popup{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;}
.ev-popup-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:380px;width:90%;text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
.ev-popup-icon{font-size:3rem;margin-bottom:12px;display:block;}
.ev-popup-title{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--teal);margin-bottom:8px;}
.ev-popup-desc{font-size:.9rem;color:var(--text2);line-height:1.5;margin-bottom:20px;}
.ev-popup-choices{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.choice-btn{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;cursor:pointer;font-size:.85rem;font-weight:800;color:var(--text);transition:.15s;font-family:'Nunito',sans-serif;}
.choice-btn:hover{border-color:var(--teal);background:#1cc8a020;color:var(--teal);}

@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes shimmer{to{left:200%;}}
@keyframes notifIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes popIn{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:900px){
  .main{grid-template-columns:1fr;}
  .panel-left,.panel-right{display:none;}
  .tray-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<div class="hdr">

   ]},
  {icon:'👋', title:'Visita inesperada',
   desc:'Tu vecino quiere pasar. ¿Le abres la puerta?',
   choices:[
     {text:'¡Claro, pasa!',  effects:{social:30,fun:15,energy:-10}, msg:'¡Tarde genial con el vecino!'},
     {text:'Ahora no puedo', effects:{social:-10},                   msg:'El vecino se fue algo triste...'},
   ]},
  {icon:'🎰', title:'Lotería del barrio',
   desc:'Compraste un ticket de la lotería local. ¿La suerte está contigo?',
   choices:[
     {text:'Rasca el ticket', effects:{money:200,fun:15}, msg:'¡Premio! 🎰'},
     {text:'Tirarlo',         effects:{fun:-5},            msg:'Probablemente no ganabas nada...'},
   ]},
  {icon:'🍕', title:'Pizza gratis',
   desc:'El repartidor trajo 2 pizzas. Te ofrece quedarte la extra.',
   choices:[
     {text:'¡La acepto!',  effects:{hunger:-30,fun:20}, msg:'¡Pizza de regalo! 🍕'},
     {text:'Devolverla',   effects:{social:10,fun:5},   msg:'Qué honesta, te quedaste con buen karma'},
   ]},
  {icon:'⚡', title:'Corte de luz',
   desc:'Se fue la luz en tu casa. Una oportunidad para algo diferente.',
   choices:[
     {text:'Velas y libro',  effects:{fun:15,social:-5,energy:-5},           msg:'Noche acogedora a la luz de velas 🕯️'},
     {text:'Salir al bar',   effects:{fun:30,social:25,money:-40,energy:-20}, msg:'Improvisada noche de copas 🍻'},
   ]},
];

const MOODLETS_DEF = [
  {id:'wellRested', icon:'😴', label:'Descansada',    condition:s=>s.energy>80,    good:true},
  {id:'hungry',     icon:'🤤', label:'Hambrienta',    condition:s=>s.hunger>75,    good:false},
  {id:'fun',        icon:'🎮', label:'Divirtiéndose', condition:s=>s.fun>70,       good:true},
  {id:'social',     icon:'👥', label:'Bien social',   condition:s=>s.social>70,    good:true},
  {id:'tired',      icon:'😫', label:'Cansada',       condition:s=>s.energy<25,    good:false},
  {id:'stinky',     icon:'💨', label:'Sucia',         condition:s=>s.hygiene<25,   good:false},
  {id:'healthy',    icon:'💪', label:'Saludable',     condition:s=>s.health>80,    good:true},
];

let logEntries = [];

function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function fmt(h){return String(h).padStart(2,'0')+':00';}

function getMoodInfo(){
  const s = G.stats;
  const avg = (s.energy + s.fun + s.social + s.health + (100-s.hunger) + s.hygiene)/6;
  if(avg>80) return {emoji:'🤩',label:'¡Increíble!',color:'#f5c842'};
  if(avg>65) return {emoji:'😊',label:'Feliz',      color:'#1cc8a0'};
  if(avg>50) return {emoji:'😐',label:'Regular',    color:'#8b949e'};
  if(avg>35) return {emoji:'😟',label:'Triste',     color:'#ff9f43'};
  return            {emoji:'😫',label:'Miserable',  color:'#ff6b6b'};
}

function buildNeeds(){
  const c = document.getElementById('needsContainer');
  c.innerHTML = '';
  NEEDS_DEF.forEach(n=>{
    const div = document.createElement('div');
    div.className = 'need';
    div.innerHTML = `
      <div class="need-row">
        <span class="need-label">${n.icon} ${n.label}</span>
        <span class="need-val" id="nv_${n.key}">50</span>
      </div>
      <div class="need-track">
        <div class="need-fill" id="nf_${n.key}" style="background:${n.color};width:50%"></div>
      </div>`;
    c.appendChild(div);
  });
}

function buildActions(){
  const g = document.getElementById('trayGrid');
  g.innerHTML = '';
  ACTIONS.forEach(a=>{
    const btn = document.createElement('div');
    btn.className = 'act-btn';
    btn.id = 'actBtn_'+a.id;
    btn.onclick = ()=>doAction(a);
    btn.innerHTML = `
      <div class="shimmer"></div>
      <span class="act-icon">${a.icon}</span>
      <span class="act-name">${a.name}</span>
      <span class="act-cost" style="color:${a.cost.startsWith('§')?'#ff9f43':'#4a9eff'}">${a.cost||'Gratis'}</span>`;
    g.appendChild(btn);
  });
}

function buildSkills(){
  const c = document.getElementById('skillsContainer');
  c.innerHTML = '';
  const SKILL_DEF = [
    {key:'cooking', icon:'🍳', label:'Cocina',    color:'#ff9f43'},
    {key:'fitness', icon:'🏋️', label:'Atletismo', color:'#1cc8a0'},
    {key:'gaming',  icon:'🎮', label:'Gaming',    color:'#9b7fe8'},
    {key:'charisma',icon:'💬', label:'Carisma',   color:'#fd79a8'},
  ];
  SKILL_DEF.forEach(sk=>{
    const pct = Math.min(100, G.skills[sk.key]);
    const div = document.createElement('div');
    div.className = 'skill-row';
    div.innerHTML = `
      <span class="skill-icon">${sk.icon}</span>
      <div class="skill-info">
        <div class="skill-name">${sk.label}</div>
        <div class="skill-bar">
          <div class="skill-fill" id="skf_${sk.key}" style="background:${sk.color};width:${pct}%"></div>
        </div>
      </div>
      <span class="skill-pct" id="skp_${sk.key}">${Math.floor(pct)}</span>`;
    c.appendChild(div);
  });
}

function updateNeeds(){
  NEEDS_DEF.forEach(n=>{
    const raw = G.stats[n.key];
    const f = document.getElementById('nf_'+n.key);
    const v = document.getElementById('nv_'+n.key);
    if(f) f.style.width = clamp(raw,0,100)+'%';
    if(v) v.textContent = Math.round(raw);
    if(f){
      if(n.invert){
        f.style.background = raw>75?'#ff6b6b':raw>50?'#ff9f43':n.color;
      } else {
        f.style.background = raw<25?'#ff6b6b':raw<45?'#ff9f43':n.color;
      }
    }
  });
}

function updateMoodlets(){
  const bar = document.getElementById('moodletBar');
  bar.innerHTML = '';
  const mood = getMoodInfo();
  const mb = document.getElementById('moodBadge');
  const av = document.getElementById('avatarEmoji');
  if(mb) mb.textContent = mood.emoji;
  if(av) av.style.boxShadow = `0 0 20px ${mood.color}55`;
  MOODLETS_DEF.forEach(m=>{
    if(m.condition(G.stats)){
      const el = document.createElement('div');
      el.className = 'moodlet '+(m.good?'active':'bad');
      el.textContent = m.icon+' '+m.label;
      bar.appendChild(el);
    }
  });
}

function updateSkills(){
  ['cooking','fitness','gaming','charisma'].forEach(k=>{
    const pct = Math.min(100,G.skills[k]);
    const f = document.getElementById('skf_'+k);
    const p = document.getElementById('skp_'+k);
    if(f) f.style.width = pct+'%';
    if(p) p.textContent = Math.floor(pct);
  });
}

function updateUI(){
  document.getElementById('hDay').textContent = G.time.day;
  document.getElementById('hClock').textContent = fmt(G.time.hour);
  document.getElementById('hDayName').textContent = DAYS[(G.time.day-1)%7];
  document.getElementById('hMoney').textContent = G.money;

  const needed = G.level*100;
  document.getElementById('lvlNum').textContent = G.level;
  document.getElementById('xpNum').textContent = G.xp;
  document.getElementById('xpMax').textContent = needed;
  document.getElementById('xpFill').style.width = (G.xp/needed*100)+'%';

  document.getElementById('stActions').textContent = G.todayStats.actions;
  document.getElementById('stEarned').textContent = G.todayStats.earned;
  document.getElementById('stFun').textContent = Math.round(G.todayStats.fun);
  document.getElementById('stEvents').textContent = G.todayStats.events;

  updateNeeds();
  updateMoodlets();
  updateSkills();

  const mood = getMoodInfo();
  const sf = document.getElementById('simFace');
  if(sf) sf.textContent = mood.emoji;
}

function addLog(text, type='ok'){
  const c = document.getElementById('logContainer');
  const t = fmt(G.time.hour);
  logEntries.unshift({text,t,type});
  if(logEntries.length>8) logEntries.pop();
  c.innerHTML = '';
  logEntries.forEach(e=>{
    const div = document.createElement('div');
    div.className = 'ev-item';
    div.innerHTML = `<div class="ev-dot ${e.type==='bad'?'bad':e.type==='warn'?'warn':''}"></div>
      <span class="ev-time">${e.t}</span>
      <span>${e.text}</span>`;
    c.appendChild(div);
  });
}

function notify(text, type='ok'){
  const layer = document.getElementById('notifLayer');
  const n = document.createElement('div');
  n.className = 'notif'+(type==='bad'?' bad':type==='warn'?' warn':'');
  n.textContent = text;
  layer.appendChild(n);
  setTimeout(()=>{n.style.opacity='0';n.style.transform='translateX(100%)';n.style.transition='.3s';},2200);
  setTimeout(()=>n.remove(),2600);
}

function gainXP(amount){
  G.xp += amount;
  const needed = G.level*100;
  if(G.xp >= needed){
    G.xp -= needed;
    G.level++;
    notify('⭐ ¡Nivel '+G.level+' desbloqueado!');
    addLog('⭐ Subiste al nivel '+G.level+'!');
  }
}

function doAction(a){
  if(G.isBusy) return;
  if(a.money<0 && G.money+a.money<0){
    notify('💸 No tienes suficiente dinero!','warn'); return;
  }
  if(G.stats.energy<10 && a.id!=='sleep' && a.id!=='meditate'){
    notify('⚠️ Estás demasiado cansada para esto','bad'); return;
  }

  G.isBusy = true;
  document.querySelectorAll('.act-btn').forEach(b=>b.classList.add('busy'));
  const msg = a.texts[Math.floor(Math.random()*a.texts.length)];
  document.getElementById('actionStatus').textContent = a.icon+' '+msg+'...';

  setTimeout(()=>{
    Object.keys(a.effects).forEach(stat=>{
      G.stats[stat] = clamp((G.stats[stat]||0)+a.effects[stat], 0, 100);
    });
    G.money = Math.max(0, G.money+a.money);
    if(a.money>0) G.todayStats.earned += a.money;
    if(a.skill) G.skills[a.skill] = Math.min(100, G.skills[a.skill]+3);
    G.todayStats.actions++;
    G.todayStats.fun += Math.max(0, a.effects.fun||0);

    gainXP(a.xp);
    advanceTime(a.time);
    notify(a.icon+' '+msg);
    addLog(a.icon+' '+msg);
    document.getElementById('actionStatus').textContent = '';
    G.isBusy = false;
    document.querySelectorAll('.act-btn').forEach(b=>b.classList.remove('busy'));
    updateUI();
    saveGame();
    maybeRandomEvent();
  }, 600+Math.random()*400);
}

function advanceTime(hrs){
  G.time.hour += hrs;
  if(G.time.hour >= 24){
    G.time.hour -= 24;
    G.time.day++;
    G.stats.hunger  = clamp(G.stats.hunger+12,  0,100);
    G.stats.energy  = clamp(G.stats.energy-8,   0,100);
    G.stats.fun     = clamp(G.stats.fun-5,       0,100);
    G.stats.social  = clamp(G.stats.social-8,    0,100);
    G.todayStats    = {actions:0,earned:0,fun:0,events:0};
    notify('🌅 Nuevo día — ¡Día '+G.time.day+'!');
    addLog('🌅 Amaneció un nuevo día');
  }
}

function maybeRandomEvent(){
  if(Math.random()>0.22 || G.isBusy) return;
  const ev = RANDOM_EVENTS[Math.floor(Math.random()*RANDOM_EVENTS.length)];
  G.isBusy = true;
  document.querySelectorAll('.act-btn').forEach(b=>b.classList.add('busy'));
  showEventPopup(ev);
}

function showEventPopup(ev){
  const overlay = document.createElement('div');
  overlay.className = 'ev-popup';
  const btnHtml = ev.choices.map((c,i)=>`<button class="choice-btn" id="ch${i}">${c.text}</button>`).join('');
  overlay.innerHTML = `<div class="ev-popup-card">
    <span class="ev-popup-icon">${ev.icon}</span>
    <div class="ev-popup-title">${ev.title}</div>
    <div class="ev-popup-desc">${ev.desc}</div>
    <div class="ev-popup-choices">${btnHtml}</div>
  </div>`;
  document.body.appendChild(overlay);

  ev.choices.forEach((c,i)=>{
    document.getElementById('ch'+i).onclick = ()=>{
      Object.keys(c.effects).forEach(k=>{
        if(k==='money') G.money = Math.max(0, G.money+(c.effects[k]||0));
        else G.stats[k] = clamp((G.stats[k]||0)+(c.effects[k]||0), 0, 100);
      });
      G.todayStats.events++;
      overlay.remove();
      G.isBusy = false;
      document.querySelectorAll('.act-btn').forEach(b=>b.classList.remove('busy'));
      notify('🎲 '+c.msg);
      addLog('🎲 '+c.msg);
      updateUI();
      saveGame();
    };
  });
}

function passiveDecay(){
  if(G.isBusy) return;
  G.stats.hunger  = clamp(G.stats.hunger+0.12,  0,100);
  G.stats.energy  = clamp(G.stats.energy-0.07,  0,100);
  G.stats.fun     = clamp(G.stats.fun-0.04,      0,100);
  G.stats.social  = clamp(G.stats.social-0.06,   0,100);
  G.stats.hygiene = clamp(G.stats.hygiene-0.05,  0,100);
  if(G.stats.hunger>=95 || G.stats.energy<=5){
    G.stats.health = clamp(G.stats.health-0.15, 0,100);
  }
  updateUI();
}

function saveGame(){
  try{ localStorage.setItem('simsLife2', JSON.stringify(G)); }catch(e){}
}

function loadGame(){
  try{
    const s = localStorage.getItem('simsLife2');
    if(s){ const d=JSON.parse(s); Object.assign(G,d); }
  }catch(e){}
}

loadGame();
buildNeeds();
buildActions();
buildSkills();
updateUI();
setInterval(passiveDecay, 800);
</script>
</body>
</html>
