<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Usuarios</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Arial", sans-serif; font-size: 12px; user-select: none; }
        body, html { width: 100%; height: 100%; background: #c0c0c0; color: #000; padding: 10px; }
        .box { border-top: 2px solid #808080; border-left: 2px solid #808080; border-right: 2px solid #fff; border-bottom: 2px solid #fff; background: #fff; padding: 10px; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; }
        input { padding: 4px; border-top: 2px solid #808080; border-left: 2px solid #808080; border-right: 2px solid #fff; border-bottom: 2px solid #fff; outline: none; text-align: center; width: 180px; }
        button { padding: 4px 15px; background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff; border-right: 2px solid #000; border-bottom: 2px solid #000; cursor: pointer; font-weight: bold; }
        button:active { border-top: 2px solid #000; border-left: 2px solid #000; border-right: 2px solid #fff; border-bottom: 2px solid #fff; }
        .hidden { display: none !important; }
        .msg { font-weight: bold; font-size: 11px; margin-top: 4px; }
    </style>
</head>
<body>

    <!-- PASO 1: Bloqueo de acceso solo para ti -->
    <div class="box" id="lock-screen">
        <p><strong>🔒 ACCESO RESTRINGIDO</strong></p>
        <p style="text-align: center; color: #555;">Introduce la Clave Maestra de Desarrollador:</p>
        <input type="password" id="master-pass" placeholder="Clave secreta...">
        <button onclick="checkMaster()">Acceder</button>
        <div class="msg" id="lock-error" style="color: red;"></div>
    </div>

    <!-- PASO 2: Panel de gestión de usuarios (Oculto al principio) -->
    <div class="box hidden" id="admin-panel">
        <p><strong>Configuración de Usuario: Administrador</strong></p>
        <p style="color: #444;">Escribe la nueva contraseña para el Login:</p>
        <input type="text" id="new-login-pass" placeholder="Nueva contraseña...">
        <button onclick="changeSystemPassword()">Aplicar Cambios</button>
        <div class="msg" id="panel-success" style="color: green;"></div>
    </div>

    <script>
        // Clave maestra exclusiva para que solo tú puedas entrar a configurar
        const CLAVE_MAESTRA = "ADMIN95"; 

        function checkMaster() {
            const input = document.getElementById('master-pass').value;
            if (input === CLAVE_MAESTRA) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                const err = document.getElementById('lock-error');
                err.innerText = "❌ Clave incorrecta. Acceso denegado.";
                setTimeout(() => err.innerText = "", 2000);
            }
        }

        function changeSystemPassword() {
            const nuevaClave = document.getElementById('new-login-pass').value.trim();
            if (nuevaClave === "") {
                alert("La contraseña no puede estar vacía.");
                return;
            }

            // Usamos window.parent para sobreescribir la contraseña directamente en el index.html
            if (window.parent && window.parent.SU_SISTEMA_PASS !== undefined) {
                window.parent.SU_SISTEMA_PASS = nuevaClave;
                
                const success = document.getElementById('panel-success');
                success.innerText = "💾 ¡Contraseña del sistema actualizada!";
                document.getElementById('new-login-pass').value = "";
                setTimeout(() => success.innerText = "", 3000);
            } else {
                alert("Error de comunicación con Mini OS 95.");
            }
        }
    </script>
</body>
</html>
